<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="520" viewBox="0 0 1600 520" role="img" aria-labelledby="title desc">
  <title id="title">Flujo del laboratorio WordPress en OKE</title>
  <desc id="desc">Siete pasos desde OCIR y OKE Quick Create hasta la validacion de WordPress.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fffaf5"/>
      <stop offset="1" stop-color="#f3eee8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#312d2a" flood-opacity="0.15"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#c74634"/>
    </marker>
    <style>
      .title { font: 700 34px Arial, sans-serif; fill: #312d2a; }
      .subtitle { font: 400 18px Arial, sans-serif; fill: #5b5652; }
      .step-number { font: 700 25px Arial, sans-serif; fill: white; text-anchor: middle; dominant-baseline: middle; }
      .step-title { font: 700 19px Arial, sans-serif; fill: #312d2a; text-anchor: middle; }
      .step-detail { font: 400 15px Arial, sans-serif; fill: #5b5652; text-anchor: middle; }
      .command { font: 700 14px Consolas, monospace; fill: #7a2118; text-anchor: middle; }
    </style>
  </defs>
  <rect width="1600" height="520" rx="28" fill="url(#bg)"/>
  <text x="800" y="58" class="title" text-anchor="middle">Laboratorio WordPress en Oracle Kubernetes Engine</text>
  <text x="800" y="90" class="subtitle" text-anchor="middle">Ruta guiada desde las imagenes en OCIR hasta la aplicacion publica</text>

  <path d="M226 270 H282 M438 270 H494 M650 270 H706 M862 270 H918 M1074 270 H1130 M1286 270 H1342" stroke="#c74634" stroke-width="5" fill="none" marker-end="url(#arrow)"/>

  <g filter="url(#shadow)">
    <rect x="55" y="145" width="180" height="250" rx="20" fill="white" stroke="#e3d9cf"/>
    <circle cx="145" cy="188" r="27" fill="#c74634"/><text x="145" y="189" class="step-number">1</text>
    <text x="145" y="245" class="step-title">Publicar imagenes</text>
    <text x="145" y="276" class="step-detail">WordPress y MySQL</text>
    <text x="145" y="301" class="step-detail">quedan disponibles</text>
    <text x="145" y="326" class="step-detail">en OCIR</text>
    <text x="145" y="365" class="command">docker push</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="267" y="145" width="180" height="250" rx="20" fill="white" stroke="#e3d9cf"/>
    <circle cx="357" cy="188" r="27" fill="#c74634"/><text x="357" y="189" class="step-number">2</text>
    <text x="357" y="245" class="step-title">Crear OKE</text>
    <text x="357" y="276" class="step-detail">Wizard Quick Create</text>
    <text x="357" y="301" class="step-detail">VCN, nodos y</text>
    <text x="357" y="326" class="step-detail">subredes</text>
    <text x="357" y="365" class="command">Cluster Active</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="479" y="145" width="180" height="250" rx="20" fill="white" stroke="#e3d9cf"/>
    <circle cx="569" cy="188" r="27" fill="#c74634"/><text x="569" y="189" class="step-number">3</text>
    <text x="569" y="245" class="step-title">Conectar</text>
    <text x="569" y="276" class="step-detail">Abrir OCI Cloud Shell</text>
    <text x="569" y="301" class="step-detail">y generar el</text>
    <text x="569" y="326" class="step-detail">kubeconfig</text>
    <text x="569" y="365" class="command">kubectl get nodes</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="691" y="145" width="180" height="250" rx="20" fill="white" stroke="#e3d9cf"/>
    <circle cx="781" cy="188" r="27" fill="#c74634"/><text x="781" y="189" class="step-number">4</text>
    <text x="781" y="245" class="step-title">Configurar</text>
    <text x="781" y="276" class="step-detail">Variables educativas</text>
    <text x="781" y="301" class="step-detail">y credenciales</text>
    <text x="781" y="326" class="step-detail">de OCIR</text>
    <text x="781" y="365" class="command">source .env.oke</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="903" y="145" width="180" height="250" rx="20" fill="white" stroke="#e3d9cf"/>
    <circle cx="993" cy="188" r="27" fill="#c74634"/><text x="993" y="189" class="step-number">5</text>
    <text x="993" y="245" class="step-title">Crear secretos</text>
    <text x="993" y="276" class="step-detail">Acceso a OCIR y</text>
    <text x="993" y="301" class="step-detail">variables de</text>
    <text x="993" y="326" class="step-detail">WordPress/MySQL</text>
    <text x="993" y="365" class="command">kubectl create secret</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="1115" y="145" width="180" height="250" rx="20" fill="white" stroke="#e3d9cf"/>
    <circle cx="1205" cy="188" r="27" fill="#c74634"/><text x="1205" y="189" class="step-number">6</text>
    <text x="1205" y="245" class="step-title">Desplegar</text>
    <text x="1205" y="276" class="step-detail">Pods, Services y</text>
    <text x="1205" y="301" class="step-detail">dos volumenes</text>
    <text x="1205" y="326" class="step-detail">persistentes</text>
    <text x="1205" y="365" class="command">kubectl apply</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="1327" y="145" width="218" height="250" rx="20" fill="#312d2a" stroke="#312d2a"/>
    <circle cx="1436" cy="188" r="27" fill="#c74634"/><text x="1436" y="189" class="step-number">7</text>
    <text x="1436" y="245" class="step-title" fill="white" style="fill:white">Validar WordPress</text>
    <text x="1436" y="276" class="step-detail" fill="white" style="fill:#eee7e1">Esperar la IP publica</text>
    <text x="1436" y="301" class="step-detail" fill="white" style="fill:#eee7e1">del OCI Load</text>
    <text x="1436" y="326" class="step-detail" fill="white" style="fill:#eee7e1">Balancer</text>
    <text x="1436" y="365" class="command" fill="white" style="fill:#ffb7aa">http://EXTERNAL-IP</text>
  </g>

  <text x="800" y="470" class="subtitle" text-anchor="middle">Todos los comandos se ejecutan manualmente desde OCI Cloud Shell</text>
</svg>
